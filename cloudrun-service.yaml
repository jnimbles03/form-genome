apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: form-genome
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "4"
    spec:
      containers:
      - image: gcr.io/PROJECT_ID/form-genome:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        resources:
          limits:
            cpu: "1000m"
            memory: "512Mi"
