<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The Form Genome Project — Under Construction</title>
<style>
:root{ --bg:#06080e; --ink:#e8eef6; --muted:#a1afc4; --hair:#253145; --accent:#76e0a6; --radius:16px; }
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);
  font:400 clamp(16px,2vw,18px)/1.6 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}

/* Header */
header{position:sticky;top:0;z-index:10;
  background:linear-gradient(180deg, rgba(6,8,14,.95), rgba(6,8,14,.5), transparent);
  border-bottom:1px solid var(--hair);}
.wrap{max-width:1280px;margin:0 auto;padding:0 max(20px,4vw)}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 0}
h1{margin:0;font-weight:800;letter-spacing:.2px}

/* Canvas (orbs) */
#orbCanvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;               /* <- important */
  pointer-events:none;
}
header, main{ position:relative; z-index:1; }

/* Main splash */
main{min-height:calc(100vh - 72px);display:flex;align-items:center;justify-content:center;text-align:center}
.card{background:rgba(255,255,255,.05);border:1px solid var(--hair);
  border-radius:var(--radius);padding:22px 20px;backdrop-filter:blur(6px)}
h2{margin:0 0 8px 0;font-size:2rem}
p{margin:0;color:var(--muted);font-size:1.05rem}
</style>
</head>
<body>
<canvas id="orbCanvas"></canvas>

<header>
  <div class="wrap header-row">
    <h1>The Form Genome Project</h1>
    <div></div>
  </div>
</header>

<main class="wrap">
  <div class="card">
    <h2>🚧 Under Construction</h2>
    <p>We&rsquo;re polishing things up. Please check back soon…</p>
  </div>
</main>

<script>
window.addEventListener('load', ()=>{
  const c=document.getElementById('orbCanvas');
  const ctx=c.getContext('2d');
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  resize(); addEventListener('resize',resize);

  class Orb{
    constructor(){ this.r=Math.random()*3+1; this.x=Math.random()*c.width; this.y=Math.random()*c.height; this.dx=(Math.random()-.5)*.6; this.dy=(Math.random()-.5)*.6; }
    step(){ this.x+=this.dx; this.y+=this.dy; if(this.x<0||this.x>c.width)this.dx*=-1; if(this.y<0||this.y>c.height)this.dy*=-1; }
    draw(){
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*14);
      g.addColorStop(0,'#76e0a6'); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(this.x-this.r*14,this.y-this.r*14,this.r*28,this.r*28);
    }
  }
  const orbs=Array.from({length:40},()=>new Orb());
  (function loop(){
    ctx.fillStyle='#06080e';        /* dark base */
    ctx.fillRect(0,0,c.width,c.height);
    orbs.forEach(o=>{o.step();o.draw();});
    requestAnimationFrame(loop);
  })();
});
</script>
</body>
</html>
