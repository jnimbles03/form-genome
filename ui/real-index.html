<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Form Genome Project — Dashboard</title>
<style>
:root{
  --ink:#e8eef6; --muted:#a1afc4;
  --card:#1f2f46; --hair:#253145; --hair2:#334155;
  --accent:#76e0a6; --accent2:#5bc88e; --radius:16px;
}

/* Base */
*{box-sizing:border-box}
html,body{ margin:0; background:transparent !important; color:var(--ink);
  font:400 clamp(16px,2vw,18px)/1.6 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; }
a{color:inherit}
.visually-hidden{position:absolute;clip:rect(0 0 0 0);clip-path:inset(50%);height:1px;width:1px;overflow:hidden;white-space:nowrap}

/* Layout */
.wrap{max-width:1280px;margin:0 auto;padding:0 max(20px,4vw)}
header{position:sticky;top:0;z-index:10;background:transparent;border-bottom:none}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 0}
h1{margin:0;letter-spacing:.2px;font-weight:800}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-size:.95rem;height:40px;line-height:1;padding:0 12px;white-space:nowrap;
  border:1px solid var(--hair);border-radius:12px;background:#131c2a;color:var(--ink);
  text-decoration:none;cursor:pointer;-webkit-appearance:none;appearance:none;}
.btn.primary{background:var(--accent);color:#0a0a0a;border:none;font-weight:700}
.btn.small{height:32px;padding:0 10px;font-size:.9rem}
.btn[disabled]{opacity:.6;cursor:not-allowed}

/* Cards */
.card{background:transparent;border:1px solid transparent;border-radius:var(--radius);padding:16px;margin:14px 0}
.card.solid{background:var(--card);border:1px solid var(--hair);box-shadow:0 2px 8px rgba(0,0,0,.3)}
#activity.card{background:#0f1623;border:1px solid var(--hair);box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* Intake row */
.intake-grid{display:grid;gap:12px;grid-template-columns:1fr 1fr}
@media (max-width:900px){ .intake-grid{grid-template-columns:1fr;} }
.textarea{width:100%;min-height:180px;resize:vertical;background:#131c2a;border:1px solid var(--hair);color:var(--ink);padding:10px 12px;border-radius:12px}
.dropzone{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;
  padding:16px;border:2px dashed var(--hair);border-radius:12px;background:#0f1623;min-height:180px}
.dropzone.drag{border-color:var(--accent)}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.controls input,.controls button{background:#131c2a;border:1px solid var(--hair);color:var(--ink);padding:10px 12px;border-radius:12px}
.muted{color:var(--muted)}

/* Progress rows */
.progress-row{display:none}
.progress{width:100%;height:10px;border-radius:999px;background:#0f1623;border:1px solid var(--hair);overflow:hidden}
.progress>.bar{height:100%;width:0%;background:var(--accent);transition:width .25s ease}
.progress.indeterminate>.bar{position:relative;width:30%;animation:indet 1.2s infinite linear;background:linear-gradient(90deg,var(--accent),var(--accent2))}
@keyframes indet{0%{left:-30%}100%{left:100%}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* TABLE (home) */
#tableWrap { width: 100%; overflow-x:auto; }
table.wide{
  width: 100%;          /* full width */
  min-width: 100%;
  border-collapse: collapse;
  table-layout: auto;
  white-space: nowrap;
  font-size: 0.86rem;
}
table.wide th,table.wide td{ padding:6px 6px; border-bottom:1px solid var(--hair) }

/* Show/hide results until there’s data */
.hidden-until-data{display:none;opacity:0;transition:opacity .4s ease}
.hidden-until-data.show{display:block;opacity:1}

/* Debug panel */
.debug{background:#0f1420;border:1px solid #28324a;border-radius:12px;padding:12px}
.debug h3{margin:0 0 8px 0}
.debug .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.debug pre{max-height:220px;overflow:auto;background:#0b1020;border:1px solid #26314a;border-radius:8px;padding:10px;font-size:.85rem;line-height:1.35;color:#dce3f0}

/* Orbs */
#orbCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background:#06080e}
header, main{position:relative;z-index:1}
</style>
</head>
<body>
<a class="visually-hidden" href="#content">Skip to content</a>
<canvas id="orbCanvas"></canvas>

<header>
  <div class="wrap header-row">
    <h1>The Form Genome Project</h1>
    <nav style="display:flex;gap:8px;align-items:center">
      <a class="btn" href="/genetics">Global Genetics</a>
      <button id="methodologyBtn" class="btn" type="button">Methodology</button>
    </nav>
  </div>
</header>

<main id="content" class="wrap">
  <!-- Analyzer -->
  <section class="card solid" aria-label="Analyze PDFs">
    <h2 style="margin:0 0 12px 0">Analyze Forms</h2>

    <div class="intake-grid">
      <textarea id="input_text" class="textarea" placeholder="Paste one of the following then click Analyze:
• A page URL to crawl (e.g., https://agency.gov/forms)
• One or many PDF URLs (one per line)"></textarea>

      <div id="dropzone" class="dropzone" tabindex="0" aria-label="Drop files here">
        <div>Drag & drop <strong>PDF files</strong> or a <strong>.txt</strong> containing PDF URLs</div>
        <div class="muted" style="font-size:.95em">…or pick files</div>
        <input id="file_input" type="file" multiple accept=".pdf,.txt" style="display:none"/>
        <div><button id="pickBtn" class="btn" type="button">Choose Files</button></div>
        <div id="pickedFiles" class="muted" style="font-size:.9em"></div>
      </div>
    </div>

    <!-- Progress -->
    <div id="crawlRow" class="progress-row" style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;font-size:.9em;margin-bottom:6px">
        <span>Crawl Progress</span><span id="crawlPct">—</span>
      </div>
      <div id="crawlProgress" class="progress"><div class="bar"></div></div>
    </div>

    <div id="analyzeRow" class="progress-row" style="margin-top:10px">
      <div style="display:flex;justify-content:space-between;font-size:.9em;margin-bottom:6px">
        <span>Analyze Progress</span><span id="analyzePct">—</span>
      </div>
      <div id="analyzeProgress" class="progress"><div class="bar"></div></div>
    </div>

    <div class="controls" style="margin-top:12px">
      <button id="analyzeBtn" class="btn primary" type="button">Analyze</button>
      <button id="resetBtn" class="btn" type="button" title="Delete all records (Admin PIN required)">Reset</button>
      <span id="status" class="muted" style="margin-left:auto"></span>
    </div>

    <div id="foundCount" class="muted" style="font-weight:600;font-size:.95em;color:var(--accent);margin-top:8px">Forms Found: 0</div>

    <div id="activity" class="card" style="margin-top:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div class="spinner"></div><strong>Activity</strong>
        <span id="activityTimer" class="muted" style="margin-left:auto">00:00</span>
      </div>
      <div id="activityLog" style="max-height:160px;overflow:auto;font-size:12px;line-height:1.35"></div>
    </div>
  </section>

  <!-- Debug Panel -->
  <section class="card debug">
    <div class="row" style="justify-content:space-between">
      <h3 style="margin:0">Debug Panel</h3>
      <div class="row">
        <label style="display:flex;align-items:center;gap:6px">
          <input type="checkbox" id="toggleShowEmpties"/>
          <span>Show empties</span>
        </label>
        <button id="pingBtn" class="btn small" type="button">Ping API</button>
        <button id="copyDebugBtn" class="btn small" type="button">Copy Debug Bundle</button>
      </div>
    </div>
    <div class="row"><span class="muted">If something looks off, click “Copy Debug Bundle” and paste it to Patrick.</span></div>
    <pre id="debugOut">{}</pre>
  </section>

  <!-- Results (hidden until data exists) -->
  <section id="resultsCard" class="card hidden-until-data" aria-label="Analyzed Forms">
    <div class="controls">
      <button id="generateReport" class="btn primary" type="button">Generate Report</button>
      <label style="display:flex;align-items:center;gap:6px;font-size:.95em">
        <input id="publicSectorChk" type="checkbox" style="margin:0"> Public Sector
      </label>
      <span style="flex:1"></span>
      <button id="exportCsv" type="button" class="btn">Export CSV</button>
      <button id="exportJson" type="button" class="btn">Export JSON</button>
      <button id="refresh"  type="button" class="btn">Refresh</button>
    </div>
    <div id="tableWrap" style="margin-top:10px"></div>
  </section>
</main>

<!-- Methodology modal -->
<div id="methodologyModal" class="visually-hidden">
  <div class="modal-content">
    <div style="display:flex;justify-content:flex-end">
      <button id="methodologyClose" class="btn" type="button">Close</button>
    </div>
    <iframe src="/infographic" title="Methodology"></iframe>
  </div>
</div>

<div id="err" class="visually-hidden"></div>

<script>
"use strict";

/* ---------- global debug state ---------- */
window._dbg = {
  run: { startedAt: null, crawlUrl: null, autoAnalyze: true },
  crawl: { found: 0, urls: 0, source: "html/llm/google" },
  analyze: { submitted: 0, ok: 0, err: 0, errors: [] },
  env: { hasGoogleKey: !!(typeof GOOGLE_API_KEY !== 'undefined'), // will be false in browser
         ua: navigator.userAgent, tz: Intl.DateTimeFormat().resolvedOptions().timeZone },
  lastRecordsSample: []
};

/* ---------- bootstrap ---------- */
window.addEventListener('DOMContentLoaded', () => {
  try { initUI(); } catch(e){ console.error("[initUI]", e); }
  try { initOrbs(); } catch(e){ console.error("[orbs]", e); }
  try { loadRows().catch(()=>{}); } catch(e){}
  window.addEventListener('focus', () => loadRows().catch(()=>{}));
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadRows().catch(()=>{});
  });
});

/* ---------- UI wiring ---------- */
function initUI(){
  const btnAnalyze = document.getElementById('analyzeBtn');
  const btnReset   = document.getElementById('resetBtn');
  const btnMeth    = document.getElementById('methodologyBtn');
  const btnMethX   = document.getElementById('methodologyClose');
  const pickBtn    = document.getElementById('pickBtn');
  const dropzone   = document.getElementById('dropzone');
  const file_input = document.getElementById('file_input');
  const pingBtn    = document.getElementById('pingBtn');
  const copyBtn    = document.getElementById('copyDebugBtn');
  const showEmpties= document.getElementById('toggleShowEmpties');

  if (btnAnalyze) btnAnalyze.addEventListener('click', safe(handleAnalyze));
  if (btnReset)   btnReset.addEventListener('click',  safe(handleReset));
  if (btnMeth)    btnMeth.addEventListener('click',   ()=> document.getElementById('methodologyModal').style.display='flex');
  if (btnMethX)   btnMethX.addEventListener('click',  ()=> document.getElementById('methodologyModal').style.display='none');
  if (pickBtn)    pickBtn.addEventListener('click',   ()=> file_input && file_input.click());
  if (pingBtn)    pingBtn.addEventListener('click',   safe(pingApi));
  if (copyBtn)    copyBtn.addEventListener('click',   safe(copyDebugBundle));
  if (showEmpties) showEmpties.addEventListener('change', ()=> loadRows().catch(()=>{}));

  if (dropzone){
    ['dragenter','dragover'].forEach(ev=>dropzone.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();dropzone.classList.add('drag');}));
    ['dragleave','drop'].forEach(ev=>dropzone.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();dropzone.classList.remove('drag');}));
    dropzone.addEventListener('drop',e=>{
      const dt=e.dataTransfer; const picked=document.getElementById('pickedFiles');
      if(!dt?.files?.length) return;
      file_input.files = dt.files;
      picked && (picked.textContent = [...dt.files].map(f=>`${f.name} (${Math.round(f.size/1024)} KB)`).join(' • '));
    });
  }
  paintDebug();
}
function safe(fn){ return (...args)=>{ try{ return fn(...args); } catch(e){ console.error("[handler]", e); showErr(e.message||String(e)); } } }

/* ---------- small utilities ---------- */
function showErr(msg){ const el=document.getElementById("err"); if(!el) return; el.classList.remove('visually-hidden'); el.textContent=msg; setTimeout(()=>{ el.classList.add('visually-hidden'); el.textContent=''; }, 5000); }
let activityStart=null, activityTick=null;
function fmt(t){ const m=Math.floor(t/60), s=t%60; return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0"); }
function startActivity(title){
  const logEl=document.getElementById("activityLog"); if (logEl) logEl.innerHTML="";
  activityStart=Date.now(); clearInterval(activityTick);
  const timerEl=document.getElementById("activityTimer");
  activityTick=setInterval(()=>{ const secs=Math.floor((Date.now()-activityStart)/1000); if (timerEl) timerEl.textContent=fmt(secs); },1000);
  const sp=document.querySelector('#activity .spinner'); if (sp) sp.style.display='inline-block';
  if (title) logActivity(title);
}
function stopActivity(summary){ clearInterval(activityTick); activityTick=null; const sp=document.querySelector('#activity .spinner'); if (sp) sp.style.display='none'; if (summary) logActivity(summary); }
function logActivity(msg){ const log=document.getElementById("activityLog"); if(!log) return; const line=document.createElement("div"); const ts=new Date().toLocaleTimeString([], {hour12:false}); line.textContent="["+ts+"] "+msg; log.appendChild(line); log.scrollTop=log.scrollHeight; }
async function getJSON(u,o){ const r=await fetch(u,o||{}); const t=await r.text(); if(!r.ok) throw new Error(t||r.statusText); try{return JSON.parse(t);}catch{throw new Error("Non-JSON");} }
async function postJSON(u,body){ const r=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); const t=await r.text(); let j={}; try{j=JSON.parse(t);}catch{} if(!r.ok) throw new Error(j.error||("HTTP "+r.status)); return j; }

/* ---------- progress controls ---------- */
const crawlRowEl   = ()=>document.getElementById('crawlRow');
const crawlWrapEl  = ()=>document.getElementById('crawlProgress');
const crawlBarEl   = ()=>crawlWrapEl().querySelector('.bar');
const crawlPctEl   = ()=>document.getElementById('crawlPct');
const analyzeRowEl = ()=>document.getElementById('analyzeRow');
const analyzeBarEl = ()=>document.getElementById('analyzeProgress').querySelector('.bar');
const analyzePctEl = ()=>document.getElementById('analyzePct');

function showCrawl(ind=false){ const row=crawlRowEl(),wrap=crawlWrapEl(),bar=crawlBarEl(),pct=crawlPctEl(); if(!row||!wrap||!bar||!pct) return; row.style.display='block'; wrap.classList.toggle('indeterminate', ind); bar.style.width = ind ? '30%' : '0%'; pct.textContent = ind ? 'working…' : '0%'; }
function hideCrawl(){ const row=crawlRowEl(),wrap=crawlWrapEl(),bar=crawlBarEl(),pct=crawlPctEl(); if(!row||!wrap||!bar||!pct) return; row.style.display='none'; wrap.classList.remove('indeterminate'); bar.style.width='0%'; pct.textContent='—'; }
function setCrawlProgress(done,total){ const wrap=crawlWrapEl(),bar=crawlBarEl(),pct=crawlPctEl(); if(!wrap||!bar||!pct) return; if(!total||total<=0){ showCrawl(true); return; } wrap.classList.remove('indeterminate'); const pc=Math.max(0,Math.min(100,Math.round((done/total)*100))); bar.style.width=pc+'%'; pct.textContent=pc+'%'; }
function showAnalyze(){ const row=analyzeRowEl(),bar=analyzeBarEl(),pct=analyzePctEl(); if(!row||!bar||!pct) return; row.style.display='block'; bar.style.width='0%'; pct.textContent='0%'; }
function hideAnalyze(){ const row=analyzeRowEl(),bar=analyzeBarEl(),pct=analyzePctEl(); if(!row||!bar||!pct) return; row.style.display='none'; bar.style.width='0%'; pct.textContent='—'; }
function setAnalyzeProgress(done,total){ const bar=analyzeBarEl(),pct=analyzePctEl(); if(!bar||!pct) return; const pc = total ? Math.max(0, Math.min(100, Math.round((done/total)*100))) : 0; bar.style.width = pc + '%'; pct.textContent = total ? (pc + '%') : '—'; }

/* ---------- optional server progress poll ---------- */
let progressPoll=null;
async function pollProgressStart(){ stopProgressPolling(); progressPoll=setInterval(async ()=>{ try{ const p=await getJSON('/api/progress'); if(p?.crawl){ setCrawlProgress(p.crawl.done||0, p.crawl.total||0); } if(p?.analyze){ setAnalyzeProgress(p.analyze.done||0, p.analyze.total||0); } }catch(_){ } }, 900); }
function stopProgressPolling(){ if(progressPoll){ clearInterval(progressPoll); progressPoll=null; } }

/* ---------- helpers ---------- */
function normalizeLines(str){ return (str||'').split(/\r?\n/).map(s=>s.trim()).filter(Boolean); }
function isLikelyPdfUrl(s){ try{ const u=new URL(s); return /\.pdf(\?|#|$)/i.test(u.pathname); }catch{return false;} }
function isLikelyPageUrl(s){ try{ new URL(s); return !isLikelyPdfUrl(s); }catch{return false;} }

/* ---------- Debug helpers ---------- */
function paintDebug(extra){
  const out = document.getElementById('debugOut');
  if (!out) return;
  if (extra) Object.assign(window._dbg, extra);
  const sample = Array.isArray(window._dbg.lastRecordsSample) ? window._dbg.lastRecordsSample.slice(0,3) : [];
  const payload = Object.assign({}, window._dbg, { lastRecordsSample: sample });
  out.textContent = JSON.stringify(payload, null, 2);
}
async function pingApi(){
  const res = {};
  try { res.progress = await getJSON('/api/progress'); } catch(e){ res.progress = {error:String(e)}; }
  try { res.records  = await getJSON('/api/records');  } catch(e){ res.records  = {error:String(e)}; }
  paintDebug({ ping: res });
}
async function copyDebugBundle(){
  try{
    const bundle = Object.assign({}, window._dbg);
    // include a tiny record sample
    try { const rr = await getJSON('/api/records'); bundle.recordSample = rr.slice(0,5); bundle.recordCount = rr.length; } catch(e){}
    await navigator.clipboard.writeText(JSON.stringify(bundle, null, 2));
    showErr('Debug bundle copied to clipboard');
  }catch(e){ showErr('Copy failed: '+(e.message||e)); }
}

/* ---------- main handlers ---------- */
async function handleAnalyze(){
  try{
    // clear + snapshot current table
    document.getElementById("tableWrap").innerHTML = "";
    document.getElementById("foundCount").textContent = "Forms Found: 0";
    await loadRows?.().catch(()=>{});

    const input = document.getElementById("input_text").value.trim();
    if(!input){ logActivity?.("Paste a forms page URL or PDF URLs"); return; }

    const lines = input.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    const pageUrls = lines.filter(s => { try{ const u=new URL(s); return !/\.pdf(\?|#|$)/i.test(u.pathname); }catch{return false;}});
    const pdfUrls  = lines.filter(s => { try{ const u=new URL(s); return  /\.pdf(\?|#|$)/i.test(u.pathname); }catch{return false;}});

    showCrawl?.(); showAnalyze?.(); showCancel(true); analyzeAbort = {aborted:false};

    // Crawl if exactly 1 page URL and no PDFs
    if (pageUrls.length===1 && pdfUrls.length===0){
      const url = pageUrls[0];
      logActivity?.('Crawling page: '+url);
      const j = await postJSON('/api/crawl', { url, max_pdfs:200, same_domain:false, allow_offsite:true, depth:1, compat:true, timeout:12 });
      const urlsFromCrawl = Array.isArray(j.urls) ? j.urls : [];
      setCrawlProgress?.(urlsFromCrawl.length, urlsFromCrawl.length);
      setTimeout(()=> hideCrawl?.(), 600);
      if (urlsFromCrawl.length){
        await bulkAnalyze(urlsFromCrawl, document.getElementById('status'), 'Auto-analyzed');
      }
    }

    // Direct PDF URLs
    if (pdfUrls.length){
      await bulkAnalyze(pdfUrls, document.getElementById('status'), 'URL analyses');
    }

    await loadRows?.();
    showCancel(false); hideAnalyze?.(); logActivity?.("Done");
  }catch(e){
    showCancel(false); hideCrawl?.(); hideAnalyze?.();
    logActivity?.("ERR: "+(e.message||e));
  }
}


// ===== Concurrency config =====
const ANALYZE_CONCURRENCY = 12;   // try 8–16
const ANALYZE_TIMEOUT_SEC = 60;   // per-URL timeout
let analyzeAbort = { aborted: false };

function showCancel(show=true){
  const b = document.getElementById('cancelBtn'); // make sure you have this button
  if (!b) return;
  b.style.display = show ? 'inline-flex' : 'none';
  b.onclick = ()=>{ analyzeAbort.aborted = true; };
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function withRetry(fn, {retries=2, baseDelay=400}={}){
  let attempt = 0;
  while(true){
    try{ return await fn(); }
    catch(err){
      if (attempt >= retries) throw err;
      await sleep(baseDelay * Math.pow(2, attempt++));
    }
  }
}

async function analyzeOneUrl(u){
  if (analyzeAbort.aborted) throw new Error('Cancelled');
  const body = {
    pdf_url: u,
    timeout: ANALYZE_TIMEOUT_SEC,
    disable_size_guard: true,
    max_pdf_mb: 120,
    force_minimal: true
  };
  return withRetry(async ()=>{
    const r = await fetch('/api/analyze_pdf', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const t = await r.text();
    let j = {}; try{ j = JSON.parse(t); }catch{}
    if (!r.ok || (j && j.ok === false)) {
      const msg = (j && j.error) ? j.error : r.statusText || 'Failed';
      throw new Error(msg);
    }
    return j;
  }, {retries: 2});
}

async function runPool(items, worker, concurrency, onProgress){
  const results = [];
  let i = 0, done = 0;
  const workers = Array.from({length: Math.min(concurrency, items.length)}, async ()=>{
    while (i < items.length){
      const idx = i++; const item = items[idx];
      try{ const res = await worker(item, idx); results[idx] = {ok:true, res}; }
      catch(e){ results[idx] = {ok:false, err: e instanceof Error ? e.message : String(e)}; }
      finally{ done++; onProgress?.(done, items.length); if (analyzeAbort.aborted) break; }
      if (analyzeAbort.aborted) break;
    }
  });
  await Promise.all(workers);
  return results;
}


async function bulkAnalyze(urls, status, label){
  showAnalyze?.();                 // keep your progress UI calls
  showCancel(true);
  analyzeAbort = { aborted: false };

  let ok=0;
  const started = Date.now();

  const results = await runPool(
    urls,
    async (u, idx)=>{
      const j = await analyzeOneUrl(u);
      ok++;
      // keep logs readable: first few and every 10th
      if (typeof logActivity === 'function' && (idx < 5 || idx % 10 === 0)) logActivity('OK: '+u);
      return j;
    },
    ANALYZE_CONCURRENCY,
    (done,total)=>{
      setAnalyzeProgress?.(done, total); // your existing progress function
      // ETA
      const elapsed = (Date.now() - started)/1000;
      const rate = done / Math.max(elapsed, 0.001);
      const remain = total - done;
      const eta = Math.ceil(remain / Math.max(rate, 0.001));
      if (status) status.textContent = `${label}: ${ok} ok / ${done-ok} err — ~${eta}s left`;
    }
  );

  const fails = results.filter(r => !r || r.ok !== true).length;
  if (status) status.textContent += (fails ? ` • ERR ${fails}`:'') + (analyzeAbort.aborted?' (cancelled)':'');
  showCancel(false);
  setTimeout(()=> hideAnalyze?.(), 600);
}


async function bulkAnalyzeFiles(items, status){
  showAnalyze();
  let ok=0, err=0; const total=items.length;
  setAnalyzeProgress(0,total);
  logActivity(`Submitting ${total} PDF file(s)`);
  window._dbg.analyze.submitted += total; paintDebug();

  for (let i=0;i<total;i++){
    const it = items[i];
    try{
      const b64 = await fileToBase64(it.file);
      const r = await fetch('/api/analyze_pdf', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ pdf_bytes_b64: b64, filename: it.file.name, timeout: 25, disable_size_guard: true, max_pdf_mb: 120, force_minimal: true })
      });
      const t = await r.text();
      let j = {};
      try { j = JSON.parse(t); } catch {_dbg.analyze.errors.push({ url:it.file.name, phase:"parse", status:r.status, body:t.slice(0,200) }); }

      if (!r.ok || (j && j.ok===false)){
        err++; window._dbg.analyze.errors.push({ url:it.file.name, phase:"analyze_file", status:r.status, body:String(t).slice(0,200) });
        logActivity('ERR: '+it.file.name+' — '+(j.error || r.statusText));
      } else {
        ok++; if (i<6 || (i%10===0)) logActivity('OK: '+it.file.name);
      }
    }catch(e){
      err++; window._dbg.analyze.errors.push({ url:it.file.name, phase:"network", error:String(e) });
      logActivity('ERR: '+it.file.name+' — '+(e.message||e));
    }
    window._dbg.analyze.ok = ok; window._dbg.analyze.err = err; paintDebug();
    setAnalyzeProgress(ok+err, total);
    if (i%5===0) await new Promise(r=>setTimeout(r, 80));
  }
  status.textContent += (status.textContent? ' • ':'')+`File analyses OK ${ok}`+(err?` / ERR ${err}`:'');
  setTimeout(hideAnalyze, 600);
}

async function handleReset(){
  try{
    const pin = prompt("Enter Admin PIN to delete ALL records:");
    if (!pin) return;
    const resp = await fetch('/api/delete_records', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pin })
    });
    const j = await resp.json();
    if (!resp.ok || !j.ok){ showErr(j.msg || 'Reset failed (check ADMIN_PIN)'); logActivity('Delete failed: '+(j.msg || resp.status)); return; }

    await loadRows();
    document.getElementById('resultsCard')?.classList.remove('show');
    document.getElementById('tableWrap').innerHTML='';
    const fc = document.getElementById('foundCount'); if (fc) fc.textContent = 'Forms Found: 0';
    document.getElementById('status').textContent='All data deleted';
    logActivity(`Deleted ${j.deleted ?? 'records'}`);
  }catch(e){
    showErr(e.message||'Reset failed'); logActivity('Delete error: '+(e.message||e));
  }
}

/* ---------- file base64 ---------- */
function fileToBase64(file){ return new Promise((resolve,reject)=>{ const fr=new FileReader();
  fr.onload=()=>{ const res=fr.result.split(',')[1]||''; resolve(res); };
  fr.onerror=()=>reject(fr.error||new Error('Read error')); fr.readAsDataURL(file); }); }

/* ---------- table renderer (URL-only filter + unparsed badge + toggle empties) ---------- */
async function loadRows(){
  const raw = await getJSON("/api/records");
  window._dbg.lastRecordsSample = raw.slice(0,3); paintDebug();

  const showEmpties = document.getElementById('toggleShowEmpties')?.checked;

  // URL present is required; optionally allow empties or filter to parsed only
  let rows = raw.filter(r => ((r.source_url || r.url || "") + "").trim().length > 0);

  if (!showEmpties){
    // hide rows with no pages AND no complexity
    rows = rows.filter(r => Number(r.pages ?? r.page_count ?? 0) > 0 || Number(r.complexity_score ?? 0) > 0);
  }

  // Column order: high-signal first, URL last
  const cols = [
    "form_name","pages","complexity_score","nigo_score","signature_count",
    "attachments_required","notarization_required","conditional_logic","deadlines_present","third_party_involved",
    "field_count","text_fields","checkboxes","dropdowns","data_validation_count",
    "language_count","estimated_signer_time","estimated_processing_time",
    "entity_name","industry_vertical","industry_subvertical","form_dependencies","identification_required","click_to_agree","same_domain","witnesses_required",
    "timestamp","key_drivers","special_requirements","source_url"
  ];

  function dash(v){ if (v === undefined || v === null) return "—"; const s = String(v); return s.trim() === "" ? "—" : s; }

  rows.forEach(r=>{
    if (!r.entity_name && (r.source_url || r.url)) {
      try { const d = new URL(r.source_url || r.url).hostname; if (d) r.entity_name = d.replace(/^www\./, ""); } catch {}
    }
  });

  let html = "<table class='wide'><thead><tr>" + cols.map(c=>{
    const lbl=c.replace(/_/g,' ').replace(/\b\w/g,m=>m.toUpperCase()); return "<th>"+lbl+"</th>";
  }).join("") + "</tr></thead><tbody>";

  rows.forEach(r=>{
    const pages = Number(r.pages ?? r.page_count ?? 0);
    const cx    = Number(r.complexity_score ?? 0);
    const unparsed = (pages === 0 && cx === 0);

    html += "<tr>" + cols.map(c=>{
      if(c==="signature_count") return "<td>"+dash((r.signature_analysis?.signature_count))+"</td>";
      if(c==="witness_signature_count") return "<td>"+dash((r.signature_analysis?.witness_signature_count))+"</td>";
      if(c==="conditional_signature_count") return "<td>"+dash((r.signature_analysis?.conditional_signature_count))+"</td>";

      if(c==="pages"){ return "<td>"+dash(pages)+"</td>"; }

      if(["attachment_count","field_count","text_fields","checkboxes","dropdowns","data_validation_count","language_count","estimated_signer_time","estimated_processing_time"].includes(c)){
        return "<td>"+dash(r[c]??0)+"</td>";
      }

      if(c==="form_name"){
        const name = dash(r.form_name || r.form_title);
        const tag  = unparsed ? " <span style='font-size:.72rem;color:#a1afc4;border:1px solid #334155;border-radius:999px;padding:2px 6px;margin-left:6px'>unparsed</span>" : "";
        return "<td>"+ name + tag +"</td>";
      }

      if(c==="key_drivers"||c==="special_requirements"){
        const arr=r[c]||[];
        return "<td style='text-align:left'>"+(Array.isArray(arr)&&arr.length?arr.join(", "):"—")+"</td>";
      }

      const boolCols=['notarization_required','attachments_required','conditional_logic','deadlines_present','form_dependencies','third_party_involved','identification_required','click_to_agree','same_domain','witnesses_required'];
      if(boolCols.includes(c)){
        const v=r[c]; const yes=(v===true||v==='Yes'||v==='yes'||v==='Y'||v==='True'||v==='true');
        return "<td>"+(yes?"<span class='icon yes'>&#x2714;</span>":"<span class='icon no'>&#x274C;</span>")+"</td>";
      }

      if(c==="complexity_score"||c==="nigo_score"){
        const z=Number(r[c]??0);
        const w=Math.max(0,Math.min(100,isFinite(z)?z:0));
        return "<td><span class='mini'><span style='width:"+w+"%'></span></span></td>";
      }

      if(c==="timestamp"){ return "<td>"+dash(r.timestamp)+"</td>"; }

      if(c==="source_url"){
        const u=r.url||r.source_url||"";
        return "<td>"+(u?("<a href='"+u+"' target='_blank' rel='noopener'>View</a>"):"—")+"</td>";
      }

      return "<td>"+dash(r[c])+"</td>";
    }).join("") + "</tr>";
  });

  html += "</tbody></table>";
  document.getElementById("tableWrap").innerHTML = html;

  // Counts and show/hide
  const unparsedCount = rows.filter(r => Number(r.pages ?? r.page_count ?? 0) === 0 && Number(r.complexity_score ?? 0) === 0).length;
  const fc=document.getElementById("foundCount");
  if (fc) fc.textContent = "Forms Found: " + rows.length + (unparsedCount ? `  (unparsed ${unparsedCount})` : "");

  const results = document.getElementById('resultsCard');
  if (rows.length > 0) results?.classList.add('show'); else results?.classList.remove('show');

  paintDebug({ lastRecordsSample: rows.slice(0,3) });
}

/* ---------- endpoint pings ---------- */
async function pingApi(){
  const res = {};
  try { res.progress = await getJSON('/api/progress'); } catch(e){ res.progress = {error:String(e)}; }
  try { res.records  = await getJSON('/api/records');  } catch(e){ res.records  = {error:String(e)}; }
  paintDebug({ ping: res });
}

/* ---------- report/export ---------- */
document.getElementById('exportCsv')?.addEventListener('click', async ()=>{
  try{
    const resp=await fetch('/api/export.csv'); if(!resp.ok) throw new Error('Failed to export CSV');
    const blob=await resp.blob(); const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='records.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }catch(e){ showErr(e.message||'CSV export failed'); }
});
document.getElementById('exportJson')?.addEventListener('click', async ()=>{
  try{
    const resp=await fetch('/api/export.json'); if(!resp.ok) throw new Error('Failed to export JSON');
    const blob=await resp.blob(); const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='records.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);

});
document.getElementById("generateReport").addEventListener("click", async (ev)=>{
  const btn = ev.currentTarget;
  try{
    btn.disabled = true;
    const isPublic = !!document.getElementById('publicSectorChk')?.checked;
    const resp = await fetch('/api/report/generate', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ public_sector: isPublic })
    });
    if (!resp.ok){
      const t = await resp.text(); throw new Error(`Report failed (${resp.status}). ${t.slice(0,200)}`);
    }
    const blob = await resp.blob(); const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = isPublic ? 'form_genome_public_sector_report.html' : 'form_genome_report.html';
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }catch(e){ showErr(e.message||'Report failed. Is /api/report/generate implemented?'); logActivity('Report error: '+(e.message||e)); }
  finally{ btn.disabled = false; }
});

/* ---------- Orbs ---------- */
function initOrbs(){
  const canvas=document.getElementById('orbCanvas'); if(!canvas) return;
  const ctx=canvas.getContext('2d'); if(!ctx) return;
  function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; } resize(); addEventListener('resize',resize);
  class O{ constructor(){ this.r=Math.random()*15+8; this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.vx=Math.random()*0.7-0.35; this.vy=Math.random()*0.7-0.35; this.a=Math.random()*0.4+0.3; }
    step(){ this.x+=this.vx; this.y+=this.vy; if(this.x<this.r||this.x>canvas.width-this.r) this.vx*=-1; if(this.y<this.r||this.y>canvas.height-this.r) this.vy*=-1; }
    draw(){ ctx.beginPath(); const glow=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*1.5); glow.addColorStop(0,'rgba(118,224,166,0.2)'); glow.addColorStop(1,'rgba(18,161,49,0)'); ctx.fillStyle=glow; ctx.arc(this.x,this.y,this.r*1.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r); g.addColorStop(0,'rgba(118,224,166,'+(this.a+0.2)+')'); g.addColorStop(0.7,'rgba(118,224,166,'+this.a+')'); g.addColorStop(1,'rgba(118,224,166,'+(this.a*0.5)+')'); ctx.fillStyle=g; ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); } }
  const orbs=Array.from({length:Math.min(innerWidth/25,60)},()=>new O());
  (function loop(){ ctx.clearRect(0,0,canvas.width,canvas.height); orbs.forEach(o=>{o.step(); o.draw();}); requestAnimationFrame(loop); })();
}
